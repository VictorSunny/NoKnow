limit_req_zone $binary_remote_addr zone=apigeneral:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=apiauth:10m rate=1r/s;
limit_req_status 429;
    
upstream api {
    server backend:8000;
}

server {
    listen 80;

    location /ws/ {
        proxy_pass http://api/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # location /api/auth/ {
    #     proxy_pass http://api/auth/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     limit_req zone=apiauth burst=2;
    # }
    location /api/ {
        proxy_pass http://api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=apigeneral burst=10 nodelay;
    }


    # frontend config
    location / {
        index index.html index.htm;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
    include /etc/nginx/extra-conf.d/*.conf;
}
