<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}NoKnow{% endblock %}</title>
    <style>
      :root {
        --c-base: #0a0909;
        --c-base-complimentary-light: #292929;
        --c-white: #e0e7eb;
      }
      *::-webkit-scrollbar {
        display: none;
      }
      html {
        font-size: clamp(14px 2vw 16px);
        background-color: var(--c-base);
        color: var(--c-white);
      }
      main,
      body {
        display: flex;
        flex-direction: column;
      }
      body {
        height: 100svh;
        display: grid;
        grid-template-rows: 3.2rem 1fr 3.2rem;
      }
      main {
        padding: 1rem 2rem;
      }
      main {
        height: 100%;
        width: 100%;
        overflow-y: scroll;
        border: 0.1rem solid var(--c-white);
        border-radius: 0.8rem
      }
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        user-select: text;
      }
      .title {
        font-size: 1.6rem;
        text-transform: uppercase;
      }
      .centered-single-content-container {
        height: max-content;
        margin: auto;
        text-align: center;
        place-items: center;
        display: flex;
        flex-direction: column;
        gap: 1.6rem;
        font-family: monospace;
      }
      .highlighted-box {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        height: max-content;
        width: max-content;
        text-transform: capitalize;
        background-color: var(--c-base-complimentary-light);
        padding: 1.6rem;
        border-radius: 0.4rem;
      }
      .sub-text {
        scale: 0.9;
        transform-origin: center;
      }
      .large-text {
        font-size: 1.2rem;
      }
      svg {
        object-fit: cover;
        width: 100%;
        height: 100%;
        display: block;
      }
      .svg-container {
        height: 100%;
        padding-block: 0.4rem;
      }
      .site-logo-container-top {
        place-self: flex-start;
      }
      .site-logo-container-bottom {
        place-self: end;
      }
    </style>
  </head>

          stroke-linecap="round"

          fill="#e0e7eb"
          font-size="9pt"
          stroke="#000"
          stroke-width="0.25mm"
          style="stroke: #000; stroke-width: 0.25mm"
        >
          <path

        height="51.855"

      >

          id="svgGroup"
          stroke-linecap="round"
          fill-rule="evenodd"
          fill="white"
          font-size="9pt"
          stroke="#000"
          stroke-width="0.25mm"
          style="stroke: #000; stroke-width: 0.25mm"
        >
          <path
            d="M 56.201 51.855 L 34.57 51.855 L 34.57 12.939 L 25.293 12.939 L 25.293 7.275 L 32.52 0 L 44.531 0 L 56.201 11.67 L 56.201 51.855 Z M 21.777 51.855 L 0 51.855 L 0 0 L 21.777 0 L 21.777 51.855 Z"
            vector-effect="non-scaling-stroke"
          />

      </svg>
    </div>
  </body>
</html>
